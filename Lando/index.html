<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lando Gifts | مینی‌اپ تلگرام</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.14);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --success: #22c55e;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 24px;
      backdrop-filter: blur(10px);
      max-width: 500px;
      width: 100%;
      box-shadow: var(--shadow);
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 20px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      font-size: 32px;
      font-weight: bold;
      color: white;
    }

    h1 { margin: 10px 0; font-size: 28px; }
    p { color: var(--muted); line-height: 1.6; margin-bottom: 30px; }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
      border: none;
      width: 100%;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

    .btn-waiting {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      border: 1px solid var(--border);
    }

    footer {
      margin-top: 30px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">L</div>
    <h1>Lando Gifts</h1>
    <p>به زودی با تجربه‌ای متفاوت در دنیای هدایای تلگرامی همراه شما هستیم. مینی‌اپ در حال آماده‌سازی است.</p>
    
    <a href="https://t.me/landogiftsbot" class="btn btn-primary">مشاهده ربات @landogiftsbot</a>
    <button class="btn btn-waiting" onclick="alert('شما در لیست انتظار قرار گرفتید! به زودی اطلاع‌رسانی می‌کنیم.')">در انتظار مینی‌اپ...</button>
  </div>

  <footer>
    &copy; 2026 Lando Gifts. All rights reserved.
  </footer>

</body>
</html>
